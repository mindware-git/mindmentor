<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="MindMentor - AI mentor for classroom" />
        <meta name="keywords" content="AI, mentor, MindMentor, classroom" />
        {% load static %}
        <link rel="shortcut icon" href="{% static 'chatbox/favicon.ico' %}" />
        <link rel="stylesheet" href="{% static 'chatbox/style.css' %}" />
        <title>
            {% block title %}MindMentor{% endblock %}
        </title>
        {% block extra_head %}{% endblock %}
    </head>
    <body>
        <div class="container">
            <header>
                {% block header %}{% endblock %}
            </header>
            <main>
                {% block content %}{% endblock %}
            </main>
            <footer>
                {% block footer %}{% endblock %}
            </footer>
        </div>
    </body>
</html>
