{% extends "chatbox/base.html" %}
{% load static %}
{% block title %}Learner's Page{% endblock %}
{% block content %}
    <div class="quiz-container">
        <!-- Status area at top left -->
        <div class="status-area">
            <h1 class="status-title">Status: Waiting for class...</h1>
        </div>
        <!-- Ask button positioned at top right -->
        <div class="ask-button-container">
            <button id="askButton" class="ask-button">Ask</button>
        </div>
        <!-- Picture area in the middle -->
        <div id="pictureArea" class="picture-area">
            <img id="currentImage"
                 class="content-image"
                 src=""
                 alt="No image available"
                 width="600"
                 height="400">
            <div class="nav-buttons-container">
                <button id="prevButton" class="nav-button">←</button>
                <button id="nextButton" class="nav-button">→</button>
            </div>
        </div>
        <!-- Text area at the bottom -->
        <div id="textArea" class="text-area"></div>
    </div>
{% endblock %}
{% block extra_head %}
    <style>
        .nav-buttons-container {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
    </style>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        document
            .getElementById("askButton")
            .addEventListener("click", async function () {
                try {
                    const response = await fetch("/chatbox/api/v1/users/learner/ask", {
                        method: "GET"
                    });
                    const data = await response.json();
                    if (data.status === "success") {
                        alert("Now you can ask!");
                    } else {
                        alert("Failed to change mode.");
                    }
                } catch (error) {
                    console.error("Error:", error);
                    alert("An error occurred while trying to change the mode.");
                }
            });

        const socket = new WebSocket("ws://" + window.location.host + "/ws/classroom/");
        let imageIndex = 0;
        let images = [];

        socket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            const message = data.message;
            
            console.log("Received message:", message);
            
            if (typeof message === 'object') {
                document.querySelector(".status-title").textContent = "Received: " + message.type + " content";
            } else {
                document.querySelector(".status-title").textContent = "Count: " + message;
            }

            if (message.type === "sof") {
                document.querySelector(".status-title").textContent = "Start classroom";
            } else if (message.type === "eof") {
                document.querySelector(".status-title").textContent = "End of classroom";
            } else if (message.type === "image") {
                images.push("{% get_static_prefix %}" + message.path);
                updateImage();
            } else if (message.type === "text") {
                const textElement = document.createElement("p");
                textElement.textContent = message.content;
                textElement.className = "content-text";
                document.getElementById("textArea").appendChild(textElement);
            } else if (message.type === "clear") {
                document.getElementById("textArea").innerHTML = "";
                images = [];
                updateImage();
            }
        };

        function updateImage() {
            if (images.length > 0) {
                document.getElementById("currentImage").src = images[imageIndex];
            } else {
                document.getElementById("currentImage").src = "";
            }
        }

        document.getElementById("prevButton").addEventListener("click", function() {
            if (images.length > 0) {
                imageIndex = (imageIndex - 1 + images.length) % images.length;
                updateImage();
            }
        });

        document.getElementById("nextButton").addEventListener("click", function() {
            if (images.length > 0) {
                imageIndex = (imageIndex + 1) % images.length;
                updateImage();
            }
        });

        socket.onopen = function(e) {
            console.log("WebSocket connection established");
        };

        socket.onclose = function(e) {
            console.log("WebSocket connection closed");
        };

        socket.onerror = function(e) {
            console.error("WebSocket error", e);
        };
    });
    </script>
{% endblock %}
