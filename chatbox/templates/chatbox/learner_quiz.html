{% extends "chatbox/base.html" %}
{% load static %}
{% block title %}Learner's Page{% endblock %}
{% block content %}
    <div class="relative w-full min-h-screen p-4">
        <!-- Ask button positioned at top right -->
        <div class="absolute top-4 right-4">
            <button id="askButton"
                    class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded shadow">
                Ask
            </button>
        </div>
        <h1 class="text-2xl font-bold mb-4 text-center">Hello!</h1>
        <div id="content" class="w-full h-auto mb-4"></div>
        <!-- Blackboard style card for quiz -->
        <div id="blackboard"
             class="bg-gray-100 rounded-lg shadow-lg p-6 max-w-3xl mx-auto">
            <h1 class="text-xl text-gray-700">Waiting for class...</h1>
        </div>
    </div>
{% endblock %}
{% block extra_head %}
    <script>
    document.addEventListener("DOMContentLoaded", function() {
document
            .getElementById("askButton")
            .addEventListener("click", async function () {
                try {
                    const response = await fetch("/robot/mode", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded",
                        },
                        body: "mode=teaching_assistant", // or any other mode you want to set
                    });
                    const data = await response.json();
                    if (data.status === "success") {
                        alert("Now you can ask!");
                    } else {
                        alert("Failed to change mode.");
                    }
                } catch (error) {
                    console.error("Error:", error);
                    alert("An error occurred while trying to change the mode.");
                }
            });

        const socket = new WebSocket("ws://" + window.location.host + "/ws/classroom/");

        socket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            const message = data.message;
            
            // Display message in a more appropriate way
            console.log("Received message:", message);
            
            // Update the message display
            if (typeof message === 'object') {
                document.getElementById("blackboard").querySelector("h1").textContent = "Received: " + message.type + " content";
            } else {
                document.getElementById("blackboard").querySelector("h1").textContent = "Count: " + message;
            }

            if (message.type === "sof") {
                document.getElementById("blackboard").querySelector("h1").textContent = "Start classroom";
            } else if (message.type === "eof") {
                document.getElementById("blackboard").querySelector("h1").textContent = "End of classroom";
            } else if (message.type === "image") {
                const img = document.createElement("img");
                img.src = "{% get_static_prefix %}" + message.path;
                console.log("Image path:", img.src);
                img.classList.add("max-w-[800px]", "h-auto", "mx-auto", "block");
                document.getElementById("content").appendChild(img);
            } else if (message.type === "text") {
                const textElement = document.createElement("p");
                textElement.textContent = message.content;
                textElement.classList.add("text-center", "mt-4");
                document.getElementById("content").appendChild(textElement);
            } else if (message.type === "clear") {
                document.getElementById("content").innerHTML = "";
            }
        };

        socket.onopen = function(e) {
            console.log("WebSocket connection established");
        };

        socket.onclose = function(e) {
            console.log("WebSocket connection closed");
        };

        socket.onerror = function(e) {
            console.error("WebSocket error", e);
        };
    });
    </script>
{% endblock %}
