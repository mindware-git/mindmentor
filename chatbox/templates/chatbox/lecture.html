{% extends "chatbox/base.html" %}
{% block title %}{{ lecture.title }}{% endblock %}
{% block content %}
    <div class="container">
        <h1 class="title">{{ lecture.title }}</h1>
        <div id="content" class="lecture-content"></div>
        <button id="modeButton" class="mode-button">Start</button>
    </div>
{% endblock %}
{% block extra_head %}
    <script>
    document.addEventListener("DOMContentLoaded", function () {
        // Get lecture ID from Django template context
        const lectureId = "{{ lecture.id }}";
        
        document
            .getElementById("modeButton")
            .addEventListener("click", function () {
                const button = this;
                const currentMode = button.textContent.trim();

                if (currentMode === "Start") {
                    fetch(`/chatbox/api/v1/lectures/${lectureId}/start`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                    })
                    .then(response => response.json())
                    .then(data => {
                        console.log('Success:', data);
                    })
                    .catch((error) => {
                        console.error('Error:', error);
                    });
                    button.textContent = "Stop";
                    button.classList.add("stop");
                } else if (currentMode === "Stop") {
                    fetch(`/chatbox/api/v1/lectures/${lectureId}/stop`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                    })
                    .then(response => response.json())
                    .then(data => {
                        console.log('Success:', data);
                    })
                    .catch((error) => {
                        console.error('Error:', error);
                    });
                    button.textContent = "Start";
                    button.classList.remove("stop");
                }
            });
    });
    </script>
{% endblock %}
