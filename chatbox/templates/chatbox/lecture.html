{% extends "chatbox/base.html" %}
{% block title %}{{ lecture.title }}{% endblock %}
{% block content %}
    <div class="flex flex-col items-center justify-center h-screen">
        <h1 class="text-3xl font-bold mb-6">{{ lecture.title }}</h1>
        <div id="content" class="w-full h-auto"></div>
        <button id="modeButton"
                class="bg-indigo-600 text-white font-semibold py-2 px-4 rounded shadow hover:bg-indigo-700 transition duration-200">
            Start
        </button>
    </div>
{% endblock %}
{% block extra_head %}
    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const socket = new WebSocket(
            "ws://" + window.location.host + "/ws/classroom/"
        );

        socket.onopen = function (e) {
            console.log("WebSocket connection established");
        };

        socket.onclose = function (e) {
            console.log("WebSocket connection closed");
        };

        socket.onerror = function (e) {
            console.error("WebSocket error", e);
        };

        document
            .getElementById("modeButton")
            .addEventListener("click", function () {
                const button = this;
                const currentMode = button.textContent.trim();

                if (currentMode === "Start") {
                    socket.send(
                        JSON.stringify({
                            message: "start_lesson",
                        })
                    );

                    button.textContent = "Stop";
                    button.classList.remove("bg-indigo-600", "hover:bg-indigo-700");
                    button.classList.add("bg-red-600", "hover:bg-red-700");
                } else if (currentMode === "Stop") {
                    button.textContent = "Start";
                    button.classList.remove("bg-red-600", "hover:bg-red-700");
                    button.classList.add("bg-indigo-600", "hover:bg-indigo-700");
                }
            });
    });
    </script>
{% endblock %}
