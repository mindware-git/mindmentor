{% extends "chatbox/base.html" %}
{% block content %}
  <div class="flex flex-col items-center justify-center h-screen">
    <h1 class="text-3xl font-bold mb-6">Welcome!</h1>
    <div class="flex space-x-4">
      <button class="bg-blue-500 text-white font-semibold py-2 px-4 rounded shadow hover:bg-blue-600 transition duration-200"
              onclick="window.location.href='{{ base_url }}/chatbox/lectures'">I am a Teacher</button>
      <button class="bg-green-500 text-white font-semibold py-2 px-4 rounded shadow hover:bg-green-600 transition duration-200"
              onclick="window.location.href='{{ base_url }}/chatbox/users/learner'">I am a Learner</button>
    </div>
  </div>
{% endblock %}
